schema: spec-driven

context: |
  RoomHub B2B — маркетплейс краткосрочной аренды коммерческих помещений
  между юридическими лицами.

  Проблема:
  Компаниям нужны помещения на несколько часов или дней, однако поиск и
  оформление аренды обычно требуют обзвона площадок, ручной проверки
  доступности, сравнения разрозненных предложений и длительного согласования
  документов. Арендаторы теряют время, а арендодатели недополучают доход
  из-за простоя помещений.

  Ценность продукта:
  RoomHub объединяет поиск, бронирование и сопровождение B2B-сделки в одном
  сервисе. Арендодатели публикуют помещения и управляют их доступностью.
  Арендаторы фильтруют предложения, проверяют свободные интервалы и отправляют
  заявки. Если выбранное помещение занято, система предлагает похожие
  доступные варианты. Встроенный документооборот должен сопровождать сделку
  от проверки контрагента до подписания закрывающего акта.

  Основные роли:
  - Арендодатель — юридическое лицо, публикующее помещения, управляющее
    календарём доступности и обрабатывающее заявки.
  - Арендатор — юридическое лицо, выполняющее поиск помещений и оформляющее
    краткосрочную аренду.

  Ключевые возможности целевого продукта:
  - публикация и управление объявлениями о коммерческих помещениях;
  - поиск и фильтрация по городу, типу помещения, цене, вместимости и другим
    параметрам;
  - календарь занятости и проверка доступности помещения;
  - подача и обработка заявок на аренду;
  - рекомендации похожих доступных помещений;
  - проверка юридических лиц и документооборот по сделке;
  - прозрачное отслеживание статуса аренды от заявки до закрывающего акта.

  Текущее состояние backend:
  Реализован базовый модуль объявлений. Публичный REST endpoint
  GET /api/listings возвращает объявления со статусом PUBLISHED. Объявление
  содержит название, описание, город, адрес, почасовую стоимость, вместимость,
  тип помещения и ссылку на изображение. Остальные возможности относятся к
  целевому развитию продукта и должны проектироваться отдельными изменениями.

  Технический контекст:
  - Java 17;
  - Spring Boot 4.1;
  - Spring Web MVC, Spring Data JPA и Jakarta Validation;
  - PostgreSQL;
  - Flyway для миграций базы данных;
  - Maven;
  - корневой Java package: ru.esie.practice.roomhubb2b;
  - backend запускается на порту 8081.

rules:
  general:
    - Работать только в рамках текущей задачи, не менять соседние модули без необходимости.
    - Перед изменением кода сначала изучать существующую структуру проекта.
    - Не переписывать весь файл, если можно внести точечное изменение.
    - Не добавлять новую технологию или библиотеку без явной причины.
    - Не усложнять архитектуру раньше времени - сначала рабочий MVP, потом улучшения.
    - Все изменения должны сохранять запускаемость проекта.
    - После каждой задачи указывать, какие файлы были изменены и зачем.

  proposal:
    - Всегда описывать бизнес-цель изменения.
    - Указывать, какую проблему решает изменение.
    - Описывать ожидаемый результат на уровне пользователя или API.
    - Приводить пример, что должно получиться в результате.
    - Если меняется API, обязательно показывать пример request/response.
    - Если меняется база данных, описывать, какие таблицы или поля затрагиваются.
    - Если есть риск сломать frontend, явно указывать изменение контракта.
    - Не предлагать изменения, которые выходят за рамки текущего MVP.

  tasks:
    - Разбивать задачи на подзадачи, которые можно выполнить максимум за 2 часа.
    - Каждая задача должна иметь понятный Definition of Done.
    - Каждая задача должна завершаться проверяемым результатом.
    - Не объединять backend, frontend и database-изменения в одну большую задачу без необходимости.
    - Для каждой задачи указывать, какие файлы предположительно будут изменены.
    - Сначала делать минимальную рабочую версию, затем улучшения.
    - Если задача зависит от другого участника, явно указывать эту зависимость.

  backend:
    - Соблюдать структуру controller → service → repository → entity/dto.
    - Controller не должен содержать бизнес-логику.
    - Service отвечает за бизнес-логику и преобразование данных.
    - Repository отвечает только за доступ к данным.
    - Entity не отдавать напрямую наружу через API.
    - Для ответов API использовать DTO.
    - Если можно заменить class на record без изменения функционала, лучше заменить
    - По возможности заменять строковые литералы на enum
    - Названия DTO должны явно отражать назначение, например ListingResponseDto.
    - Не добавлять поля в API-ответ без обновления DTO и документации.
    - Ошибки API должны возвращаться предсказуемо, а не через stack trace.
    - Для временного MVP допускается простая реализация, но без нарушения структуры слоёв.

  api:
    - Все публичные endpoint-ы должны начинаться с /api.
    - Для списка объявлений использовать GET /api/listings.
    - В JSON использовать camelCase, например pricePerHour, imageUrl.
    - Не использовать snake_case в API-ответах frontend-у.
    - При изменении API-контракта показывать старый и новый пример ответа.
    - Не удалять существующие поля из ответа без явного решения команды.
    - Если поле добавляется в GET /api/listings, проверить, что frontend не ломается.
    - Для необязательных фильтров использовать query parameters.
    - Для идентификаторов ресурсов использовать путь вида /api/listings/{id}.

  database:
    - Не редактировать уже применённые Flyway-миграции.
    - Для каждого изменения схемы создавать новую миграцию V{N}__description.sql.
    - Seed-данные изменять новой миграцией, если база уже запускалась у других участников.
    - Названия таблиц писать во множественном числе - listings, companies, booking_requests.
    - В базе использовать snake_case для колонок.
    - В Java использовать camelCase для полей.
    - Не хранить вычисляемые данные в title, если для этого есть отдельное поле.
    - Например, вместимость хранить в capacity, а не в title.
    - После изменения миграций проверять запуск на чистой базе через docker compose down -v.

  frontend_contract:
    - Backend должен заранее согласовывать с frontend изменение структуры JSON.
    - При добавлении поля в API указывать пример объекта для фронтенд разработчика.
    - Не менять названия существующих полей без необходимости.
    - Если поле может быть null, явно указать это в описании контракта.
    - Для RoomHub listings минимальный контракт должен включать id, title, city, pricePerHour, capacity, spaceType, imageUrl.
    - Для страницы деталей объявления дополнительно использовать description и address.

  docker:
    - Проект должен запускаться через docker compose up --build.
    - Не завязывать backend только на локальный localhost, если он запускается в Docker.
    - Для backend в Docker использовать host postgres, а не localhost.
    - Локальные пароли и переменные окружения выносить в .env или .env.example.
    - Не коммитить реальные .env-файлы.
    - После изменения Dockerfile или docker-compose.yml писать, как проверить запуск.

  testing:
    - После backend-изменений проверять запуск приложения.
    - После изменения API проверять endpoint через браузер или curl.
    - После изменения миграций проверять применение Flyway.
    - Минимальная проверка для listings API:
        - docker compose up -d postgres
        - cd backend
        - mvn spring-boot:run
        - curl http://localhost:8081/api/listings
    - Если добавляется новая бизнес-логика, предложить минимум один тестовый сценарий.
    - Не считать задачу выполненной, пока endpoint не проверен вручную.

  git:
    - Работать в отдельной feature-ветке.
    - Не делать изменения напрямую в main.
    - Один PR должен решать одну логическую задачу.
    - Перед commit выполнять git status.
    - Не коммитить target, .idea, node_modules, .env и временные файлы.
    - Сообщения commit писать в стиле Conventional Commits.
    - Примеры:
        - "feat: add listings API"
        - "fix: update postgres connection"
        - "docs: describe listings response"
        - "chore: update docker compose"
    - В описании PR указывать, что сделано и как проверить.

  codex_behavior:
    - Перед генерацией кода кратко объяснять план изменений.
    - Не начинать масштабный рефакторинг без запроса.
    - Если задача неоднозначна, выбрать минимальное безопасное решение и явно написать допущение.
    - Если есть несколько вариантов реализации, предложить основной вариант и коротко объяснить выбор.
    - Не удалять существующий код, если он не мешает задаче.
    - Не менять публичный контракт API без явного указания.
    - Не добавлять мок-данные в backend-код, если данные уже должны приходить из PostgreSQL.
    - Для каждого изменения указывать команды проверки.
    - В конце ответа давать краткий список изменённых файлов.

  roomhub_specific:
    - Основной MVP-сценарий - PostgreSQL → Java backend → REST API → React frontend.
    - Главный первый сценарий - просмотр списка объявлений.
    - Объявление должно иметь отдельные поля title, description, city, address, pricePerHour, capacity, spaceType, imageUrl.
    - Не дублировать вместимость в title, если есть поле capacity.
    - Для опубликованных объявлений использовать status = PUBLISHED.
    - Frontend должен получать только опубликованные объявления.
    - Бизнес-логику заявок и бронирований добавлять постепенно после стабильной работы listings API.
